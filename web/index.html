<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>PocketCode</title>

<!-- PWA: installable, fullscreen -->
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0A0B12" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/icon.svg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PocketCode" />

<!-- Fonts (the design is built around these; without them it falls back to a generic system font) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --ground:#0A0B12;--surface:rgba(255,255,255,.04);--surface-2:rgba(255,255,255,.065);
    --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.14);
    --text:#ECEDF6;--muted:#8A8FA6;--faint:#5B6076;
    --accent:#22D3EE;--accent-2:#67E8F9;--on-accent:#04232B;--green:#46D39A;--red:#FF6A6A;--amber:#F4B740;
    --radius:16px;--r-sm:12px;--shadow:0 8px 24px rgba(0,0,0,.4);
    --fd:'Space Grotesk',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:radial-gradient(1100px 560px at 50% -22%, rgba(34,211,238,.10), transparent 70%), var(--ground);
    background-attachment:fixed;color:var(--text);font-family:var(--fb);
    height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  .mono{font-family:var(--fm);}
  button{font-family:inherit;color:inherit;}
  ::selection{background:rgba(34,211,238,.32);}
  ::-webkit-scrollbar{width:0;height:0;}

  header{
    display:flex;align-items:center;gap:12px;padding:14px 18px;
    padding-top:calc(14px + env(safe-area-inset-top));
    border-bottom:1px solid var(--line);
    background:rgba(10,11,18,.72);backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);
    position:relative;z-index:5;
  }
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(155deg,rgba(34,211,238,.28),rgba(34,211,238,.07));border:1px solid var(--line-2);display:grid;place-items:center;color:var(--accent-2);flex:none;}
  .logo svg{width:19px;height:19px;}
  header .htitle{font-family:var(--fd);font-size:18px;font-weight:600;letter-spacing:-.01em;}
  header .hsub{font-size:11px;color:var(--muted);}
  header .conn{margin-left:auto;font-family:var(--fm);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;background:var(--surface);padding:6px 12px;border-radius:999px;border:1px solid var(--line);letter-spacing:.01em;}
  header .conn .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);transition:.25s;}
  header .conn.online .dot{background:var(--green);animation:pulse 2.2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(70,211,154,.5);}70%{box-shadow:0 0 0 6px rgba(70,211,154,0);}100%{box-shadow:0 0 0 0 rgba(70,211,154,0);}}

  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fade .28s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .pad{padding:18px;}
  .hidden{display:none !important;}

  .btn{width:100%;font-family:var(--fd);background:linear-gradient(135deg,var(--accent),#0EA5C4);color:var(--on-accent);border:none;border-radius:var(--r-sm);padding:15px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(34,211,238,.3);transition:transform .12s;}
  .btn:active{transform:scale(.985);}
  .btn2{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:var(--r-sm);padding:13px;font-size:14.5px;font-weight:500;cursor:pointer;margin-top:10px;transition:border-color .2s,background .2s;}
  .btn2:active{border-color:var(--line-2);background:var(--surface-2);}
  .field input{width:100%;font-family:var(--fm);background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,211,238,.16);}
  .or{color:var(--faint);text-align:center;margin:14px 0;font-size:12.5px;}
  .seclabel{font-family:var(--fm);color:var(--faint);font-size:10.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;margin:26px 4px 12px;}
  .empty{color:var(--muted);text-align:center;font-size:14px;line-height:1.65;padding:54px 24px;}
  .empty .big{display:block;width:46px;height:46px;margin:0 auto 18px;opacity:.4;stroke:var(--muted);}
  .empty .eyebrow{display:block;font-family:var(--fm);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;}
  .empty b{color:var(--text);font-weight:600;}
  .empty .mono{color:var(--accent-2);}

  /* sessions */
  .srow{display:flex;align-items:center;gap:2px;background:var(--surface);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:var(--radius);padding:15px 13px;margin-bottom:10px;transition:border-color .2s,background .2s;}
  .srow:active{background:var(--surface-2);}
  .srow.active{border-color:rgba(34,211,238,.5);background:rgba(34,211,238,.06);}
  .srow .main{flex:1;cursor:pointer;min-width:0;}
  .srow .nm{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:10px;}
  .srow .sub{font-family:var(--fm);font-size:11.5px;color:var(--muted);margin-top:5px;margin-left:18px;letter-spacing:.01em;}
  .sdot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:none;}
  .sdot.green{background:var(--green);box-shadow:0 0 8px rgba(70,211,154,.7);}
  .sdot.amber{background:var(--amber);box-shadow:0 0 8px rgba(244,183,64,.6);}
  .iconbtn{background:none;border:none;cursor:pointer;padding:8px;border-radius:9px;color:var(--faint);display:grid;place-items:center;transition:color .2s,background .2s;}
  .iconbtn svg{width:16px;height:16px;display:block;}
  .iconbtn:active{background:var(--surface-2);color:var(--text);}

  /* chat */
  #chat{display:flex;flex-direction:column;gap:10px;padding:18px;}
  .msg{max-width:85%;padding:11px 14px;border-radius:15px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
  .user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#0EA5C4);color:var(--on-accent);border-bottom-right-radius:5px;}
  .ai{align-self:flex-start;background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:5px;}
  .tool{align-self:flex-start;max-width:92%;background:rgba(34,211,238,.06);border:1px solid var(--line);border-left:2px solid var(--accent);border-radius:10px;color:var(--accent-2);font-family:var(--fm);font-size:12px;padding:9px 12px;}
  .result{align-self:flex-start;max-width:92%;background:transparent;border:1px solid var(--line);border-radius:10px;color:var(--muted);font-family:var(--fm);font-size:11.5px;padding:9px 12px;}
  .sys{align-self:center;font-family:var(--fm);color:var(--faint);font-size:10.5px;letter-spacing:.04em;padding:2px 0;}
  .err{align-self:flex-start;background:rgba(255,106,106,.08);border:1px solid rgba(255,106,106,.25);color:#ff9a9a;font-size:13px;border-radius:12px;padding:11px 14px;}
  .approval{align-self:stretch;background:linear-gradient(180deg,rgba(244,183,64,.07),var(--surface));border:1px solid rgba(244,183,64,.3);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .approval .ahead{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
  .approval .ahead::before{content:"PERMISSION";font-family:var(--fm);font-size:9px;font-weight:500;letter-spacing:.16em;color:var(--amber);background:rgba(244,183,64,.12);border:1px solid rgba(244,183,64,.3);padding:3px 7px;border-radius:6px;}
  .approval .ahead b{color:var(--accent-2);}
  .approval .abody{background:rgba(0,0,0,.32);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:12px;font-family:var(--fm);color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:170px;overflow:auto;margin-bottom:14px;line-height:1.5;}
  .approval .abtns{display:flex;gap:10px;}
  .approval .abtns button{flex:1;font-family:var(--fd);border:none;border-radius:12px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer;transition:transform .12s;}
  .approval .abtns button:active{transform:scale(.97);}
  .approval .abtns .approve{background:var(--green);color:#04241a;}
  .approval .abtns .deny{background:transparent;color:var(--red);border:1px solid rgba(255,106,106,.35);}
  .approval .adone{font-family:var(--fm);font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.02em;}
  .typing{align-self:flex-start;font-family:var(--fm);color:var(--muted);font-size:12px;padding:2px 4px;display:flex;align-items:center;gap:2px;}
  .typing::after{content:"▌";color:var(--accent-2);animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}

  .inputbar{display:flex;gap:10px;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(10,11,18,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
  .inputbar input{flex:1;font-family:var(--fb);background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 15px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;}
  .inputbar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,211,238,.16);}
  .inputbar button{font-family:var(--fd);background:linear-gradient(135deg,var(--accent),#0EA5C4);color:var(--on-accent);border:none;border-radius:13px;padding:0 20px;font-weight:600;cursor:pointer;font-size:14px;}
  .inputbar button:active{transform:scale(.96);}

  /* inbox */
  .irow{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:9px;}
  .irow .ic{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:none;background:var(--faint);}
  .irow .it{font-size:14px;font-weight:500;}
  .irow .idet{font-size:11.5px;color:var(--muted);font-family:var(--fm);margin-top:5px;word-break:break-word;}
  .irow .itime{font-size:11px;color:var(--faint);font-family:var(--fm);margin-top:6px;letter-spacing:.02em;}

  /* settings */
  .setrow{display:flex;align-items:center;margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .setrow .t{flex:1;}
  .setrow .tt{font-size:15px;font-weight:600;}
  .setrow .ts{font-size:12px;color:var(--muted);margin-top:3px;}
  .brandname{font-family:var(--fd);font-weight:600;font-size:16px;}
  .about{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.5;}
  .sw{position:relative;width:46px;height:28px;flex:none;}
  .sw input{display:none;}
  .sw .tr{position:absolute;inset:0;background:var(--line-2);border-radius:14px;transition:.2s;}
  .sw .kn{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .sw input:checked + .tr{background:var(--accent);}
  .sw input:checked + .tr + .kn{transform:translateX(18px);}

  /* tab bar */
  .tabbar{display:flex;border-top:1px solid var(--line);background:rgba(10,11,18,.85);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);padding-bottom:env(safe-area-inset-bottom);}
  .tabbar button{flex:1;background:none;border:none;color:var(--faint);padding:11px 0 9px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .18s;}
  .tabbar .ti{width:22px;height:22px;transition:.18s;}
  .tabbar .tl{font-family:var(--fm);font-size:9.5px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
  .tabbar button.active{color:var(--accent-2);}
  .tabbar button.active .ti{transform:translateY(-1px);}
  .tabbar button.active::before{content:"";position:absolute;top:0;width:24px;height:2.5px;border-radius:0 0 3px 3px;background:var(--accent);box-shadow:0 0 10px var(--accent);}
  .tabbar .badge{position:absolute;top:8px;right:30%;width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--ground);}
</style>
</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><path d="M7.5 9.5 10.5 12l-3 2.5M13 14.5h3.5"/></svg></div>
  <div>
    <div class="htitle" id="hTitle">PocketCode</div>
    <div class="hsub" id="hSub"></div>
  </div>
  <div class="conn" id="conn"><span class="dot"></span><span id="connText"></span></div>
</header>

<!-- Sessions -->
<main id="screen-sessions" class="pad">
  <button class="btn" id="addPasteToggle">＋ Add a session</button>
  <div id="addBox" class="hidden" style="margin-top:12px;">
    <div class="field"><input id="linkInput" class="mono" placeholder="paste link: https://…/?room=…#k=…" autocomplete="off" /></div>
    <button class="btn2" id="addLinkBtn">Add & connect →</button>
  </div>
  <div class="seclabel">YOUR SESSIONS</div>
  <div id="sessionList"></div>
</main>

<!-- Chat -->
<main id="screen-chat" class="hidden" style="display:flex;flex-direction:column;">
  <div id="chatEmpty" class="empty"><svg class="big" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="eyebrow">No session</span>Pick a session in the <b>Sessions</b> tab to start.</div>
  <div id="chat" style="flex:1;"></div>
</main>
<div class="inputbar hidden" id="inputbar">
  <input id="promptInput" placeholder="Message Claude Code…" autocomplete="off" />
  <button id="sendBtn">Send</button>
</div>

<!-- Inbox -->
<main id="screen-inbox" class="hidden pad">
  <div id="inboxList"></div>
</main>

<!-- Settings -->
<main id="screen-settings" class="hidden pad">
  <div class="seclabel">DEFAULT RELAY</div>
  <div class="field"><input id="defaultRelay" class="mono" autocomplete="off" /></div>
  <div class="setrow">
    <div class="t"><div class="tt">Notifications</div><div class="ts">Buzz for approvals & finished tasks</div></div>
    <label class="sw"><input type="checkbox" id="notifToggle" /><span class="tr"></span><span class="kn"></span></label>
  </div>
  <button class="btn2" id="clearBtn" style="margin-top:18px;color:var(--red);border-color:#3a1c1c;">Clear all sessions & history</button>
  <div class="seclabel">ABOUT</div>
  <div class="brandname">PocketCode</div>
  <div class="about">Control Claude Code from your phone — end-to-end encrypted.</div>
  <div class="about">github.com/aqsa-svg/pocketcode-app</div>
  <div class="about" style="margin-top:10px;">Not affiliated with Anthropic.</div>
</main>

<!-- Tab bar -->
<nav class="tabbar" id="tabbar">
  <button data-tab="sessions" class="active">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    <span class="tl">Sessions</span><span class="badge hidden" id="badge-sessions"></span></button>
  <button data-tab="chat">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="tl">Chat</span></button>
  <button data-tab="inbox">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
    <span class="tl">Inbox</span><span class="badge hidden" id="badge-inbox"></span></button>
  <button data-tab="settings">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span class="tl">Settings</span></button>
</nav>

<script>
const $ = (id) => document.getElementById(id);
const DEFAULT_RELAY = "wss://" + (location.host || "pocketcode-relay.onrender.com");
let seq = 0; const uid = () => `${Date.now()}-${++seq}`;

// --- storage ---------------------------------------------------------------
const load = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

let sessions = load("pc_sessions", []);
let inbox = load("pc_inbox", []);
let settings = load("pc_settings", { defaultRelay: DEFAULT_RELAY, notifications: true });

// --- crypto (AES-256-GCM, Web Crypto) --------------------------------------
function b64urlToBytes(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4)s+="="; const b=atob(s),o=new Uint8Array(b.length); for(let i=0;i<b.length;i++)o[i]=b.charCodeAt(i); return o; }
function b64ToBytes(s){ const b=atob(s),o=new Uint8Array(b.length); for(let i=0;i<b.length;i++)o[i]=b.charCodeAt(i); return o; }
function bytesToB64(bytes){ let b=""; for(const x of bytes) b+=String.fromCharCode(x); return btoa(b); }
async function importKey(b64url){ return crypto.subtle.importKey("raw", b64urlToBytes(b64url), "AES-GCM", false, ["encrypt","decrypt"]); }
async function enc(key, plaintext){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ctTag = new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(plaintext)));
  const blob = new Uint8Array(12 + ctTag.length); blob.set(iv,0); blob.set(ctTag,12);
  return bytesToB64(blob);
}
async function dec(key, b64){
  const blob = b64ToBytes(b64);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv: blob.subarray(0,12)}, key, blob.subarray(12));
  return new TextDecoder().decode(pt);
}

// --- link parsing ----------------------------------------------------------
function parseLink(text){
  if(!text) return null;
  const room = (text.match(/[?&]room=([^&#\s]+)/) || [])[1];
  const keyB64 = (text.match(/[#&?]k=([A-Za-z0-9_\-]+)/) || [])[1];
  if(!room || !keyB64) return null;
  let relayUrl = settings.defaultRelay || DEFAULT_RELAY;
  const origin = text.match(/^(https?):\/\/([^/?#\s]+)/);
  if(origin) relayUrl = (origin[1]==="https"?"wss":"ws") + "://" + origin[2];
  return { relayUrl, room, keyB64url: keyB64 };
}

// --- connections (one socket per session) ----------------------------------
const conns = new Map();   // id -> { ws, key, reconnect:{timer,attempts,closed}, online, status }
const messages = new Map(); // id -> [ {id,kind,text,...} ]
const busy = new Map();     // id -> bool
let activeId = null;
let tab = "sessions";

function labelFor(id){ const s = sessions.find(x=>x.id===id); return s ? s.label : "session"; }
function msgs(id){ if(!messages.has(id)) messages.set(id, []); return messages.get(id); }

function addInbox(kind, title, detail){
  inbox.unshift({ id: uid(), ts: Date.now(), kind, title, detail: detail||"" });
  inbox = inbox.slice(0,200); save("pc_inbox", inbox);
  if(tab==="inbox") renderInbox(); updateBadges();
}

function connectSession(sess){
  let st = conns.get(sess.id);
  if(st && st.ws && (st.ws.readyState===0 || st.ws.readyState===1) && !st.reconnect.closed) return;
  st = st || { reconnect:{timer:null,attempts:0,closed:false} };
  st.reconnect.closed = false;
  conns.set(sess.id, st);
  importKey(sess.keyB64url).then((key)=>{ st.key = key; openSock(sess, st); });
}
function openSock(sess, st){
  clearTimeout(st.reconnect.timer);
  try { st.ws && st.ws.close(); } catch {}
  const ws = new WebSocket(sess.relayUrl);
  st.ws = ws;
  ws.onopen = async () => {
    st.reconnect.attempts = 0;
    ws.send(JSON.stringify({ type:"join", room: sess.room, role:"viewer" }));
    ws.send(JSON.stringify({ type:"enc", data: await enc(st.key, JSON.stringify({type:"client_hello"})) }));
    setStatus(sess.id, true, "connecting…");
  };
  ws.onclose = () => {
    setStatus(sess.id, false, "reconnecting…");
    if(st.reconnect.closed) return;
    st.reconnect.attempts++;
    st.reconnect.timer = setTimeout(()=>openSock(sess, st), Math.min(1000*st.reconnect.attempts, 8000));
  };
  ws.onerror = () => setStatus(sess.id, false, "offline");
  ws.onmessage = async (e) => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if(m.type==="enc"){ let inner; try { inner = JSON.parse(await dec(st.key, m.data)); } catch { return; } handle(sess.id, inner); return; }
    handle(sess.id, m);
  };
}
function disconnectSession(id){
  const st = conns.get(id);
  if(st){ st.reconnect.closed = true; clearTimeout(st.reconnect.timer); try { st.ws && st.ws.close(); } catch {} }
  conns.delete(id);
  if(tab==="sessions") renderSessions();
  if(id===activeId) renderConn();
  updateBadges();
}

function setStatus(id, online, status){
  const st = conns.get(id); if(st){ st.online = online; st.status = status; }
  if(tab==="sessions") renderSessions();
  if(id===activeId) renderConn();
  updateBadges();
}

function handle(id, msg){
  if(msg.type==="joined"){ setStatus(id, true, "linked"); return; }
  if(msg.type==="status"){ setStatus(id, !!msg.hostOnline, msg.hostOnline ? "connected" : "waiting for computer…"); return; }
  if(msg.type!=="event") return;
  render(id, msg.event);
}

function addMsg(id, kind, text, extra){
  msgs(id).push(Object.assign({ id: uid(), kind, text }, extra||{}));
  if(id===activeId && tab==="chat") renderChat();
}

function render(id, evt){
  if(!evt || !evt.type) return;
  switch(evt.type){
    case "user_prompt": addMsg(id,"user",evt.text); busy.set(id,true); if(id===activeId) renderChat(); break;
    case "system": if(evt.subtype==="init") addMsg(id,"sys",`session started · ${evt.model||"claude"}`); break;
    case "assistant": {
      const content = (evt.message&&evt.message.content)||[];
      for(const b of content){
        if(b.type==="text" && b.text.trim()) addMsg(id,"ai",b.text);
        else if(b.type==="tool_use") addMsg(id,"tool",`${b.name}  ${summarize(b.input)}`);
      } break;
    }
    case "user": {
      const content=(evt.message&&evt.message.content)||[];
      for(const b of content) if(b.type==="tool_result"){
        const t=typeof b.content==="string"?b.content:(Array.isArray(b.content)?b.content.map(c=>c.text||"").join(""):"");
        if(t.trim()) addMsg(id,"result","↳ "+truncate(t,400));
      } break;
    }
    case "result": if(evt.total_cost_usd!=null) addMsg(id,"sys",`done · $${Number(evt.total_cost_usd).toFixed(4)}`); break;
    case "approval_request":
      addMsg(id,"approval","",{ tool:evt.tool, input:evt.input, reqId:evt.id, decided:null });
      addInbox("approval", `${evt.tool} · ${labelFor(id)}`, describeTool(evt.tool, evt.input));
      break;
    case "vapid": if(settings.notifications) setupPush(id, evt.key); break;
    case "turn_complete": busy.set(id,false); if(id===activeId) renderChat(); addInbox("done", `Task finished · ${labelFor(id)}`); break;
    case "busy": addMsg(id,"sys","CLI is busy with another prompt — try again in a sec."); busy.set(id,false); break;
    case "error": addMsg(id,"err",evt.text); busy.set(id,false); break;
  }
}

async function sendEnc(id, obj){
  const st = conns.get(id);
  if(!st || !st.ws || st.ws.readyState!==1 || !st.key) return;
  st.ws.send(JSON.stringify({ type:"enc", data: await enc(st.key, JSON.stringify(obj)) }));
}

// --- push ------------------------------------------------------------------
let pushDone = false;
async function setupPush(id, vapidKey){
  if(pushDone || !vapidKey) return;
  if(!("serviceWorker" in navigator) || !("PushManager" in window) || !window.Notification) return;
  try{
    const reg = await navigator.serviceWorker.register("/sw.js");
    let perm = Notification.permission;
    if(perm==="default") perm = await Notification.requestPermission();
    if(perm!=="granted") return;
    const existing = await reg.pushManager.getSubscription();
    if(existing){ try { await existing.unsubscribe(); } catch {} }
    const sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: b64urlToBytes(vapidKey) });
    await sendEnc(id, { type:"push_subscription", sub: sub.toJSON() });
    pushDone = true;
  }catch{}
}

// --- actions ---------------------------------------------------------------
function persistSessions(){ save("pc_sessions", sessions); }
function addFromLink(text){
  const p = parseLink(text);
  if(!p){ alert("Couldn't read that link. Use the QR / link your CLI printed (it has the room + key)."); return; }
  const host = (p.relayUrl.match(/\/\/([^/:]+)/)||[])[1] || "relay";
  let sess = sessions.find(s=>s.room===p.room && s.relayUrl===p.relayUrl);
  if(sess){ sess.keyB64url = p.keyB64url; }
  else { sess = { id: uid(), label: `${host.split(".")[0]} · ${p.room}`, relayUrl: p.relayUrl, room: p.room, keyB64url: p.keyB64url }; sessions.unshift(sess); }
  persistSessions();
  $("linkInput").value = ""; $("addBox").classList.add("hidden");
  connectTo(sess.id);
}
function connectTo(id){ const sess = sessions.find(s=>s.id===id); if(!sess) return; connectSession(sess); activeId = id; switchTab("chat"); }
function removeSession(id){ disconnectSession(id); sessions = sessions.filter(s=>s.id!==id); persistSessions(); messages.delete(id); if(activeId===id) activeId=null; renderSessions(); }
function renameSession(id){ const s = sessions.find(x=>x.id===id); if(!s) return; const v = prompt("Rename session", s.label); if(v && v.trim()){ s.label = v.trim(); persistSessions(); renderSessions(); renderConn(); } }
async function decide(msgId, decision){
  const list = msgs(activeId); const card = list.find(x=>x.id===msgId);
  if(card){ card.decided = decision; renderChat(); if(card.reqId) await sendEnc(activeId, { type:"approval_response", id: card.reqId, decision }); }
}
async function send(){
  const text = $("promptInput").value.trim();
  if(!text || !activeId) return;
  await sendEnc(activeId, { type:"prompt", text });
  $("promptInput").value = "";
}
function clearAll(){
  if(!confirm("Clear all sessions and history?")) return;
  for(const id of Array.from(conns.keys())) disconnectSession(id);
  sessions=[]; inbox=[]; messages.clear(); activeId=null;
  save("pc_sessions",[]); save("pc_inbox",[]);
  renderSessions(); renderInbox(); renderConn(); updateBadges();
}

// --- rendering -------------------------------------------------------------
function switchTab(name){
  tab = name;
  for(const sc of ["sessions","chat","inbox","settings"]) $("screen-"+sc).classList.toggle("hidden", sc!==name);
  $("inputbar").classList.toggle("hidden", !(name==="chat" && activeId));
  document.querySelectorAll(".tabbar button").forEach(b=>b.classList.toggle("active", b.dataset.tab===name));
  $("hTitle").textContent = name==="chat" ? (activeId?labelFor(activeId):"Chat") : (name[0].toUpperCase()+name.slice(1));
  if(name==="sessions") renderSessions();
  if(name==="chat") { renderChat(); renderConn(); }
  if(name==="inbox") renderInbox();
  renderConn();
}

function renderConn(){
  const showConn = tab==="chat" && activeId;
  $("conn").style.display = showConn ? "flex" : "none";
  if(!showConn){ $("hSub").textContent = ""; return; }
  const st = conns.get(activeId);
  const online = st && st.online;
  $("conn").classList.toggle("online", !!online);
  $("connText").textContent = st ? (st.status||"offline") : "offline";
  $("hSub").textContent = "";
}

function renderSessions(){
  const live = Array.from(conns.values()).filter(c=>c.online).length;
  $("hSub").textContent = "";
  const el = $("sessionList");
  if(sessions.length===0){ el.innerHTML = '<div class="empty"><svg class="big" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span class="eyebrow">No sessions</span>Run <span class="mono">npx pocketcode</span> on your computer, then scan the code it prints.</div>'; updateBadges(); return; }
  el.innerHTML = "";
  for(const s of sessions){
    const st = conns.get(s.id);
    const isLive = !!st;
    const dotCls = st && st.online ? "green" : isLive ? "amber" : "";
    const row = document.createElement("div");
    row.className = "srow" + (activeId===s.id ? " active" : "");
    row.innerHTML =
      `<div class="main"><div class="nm"><span class="sdot ${dotCls}"></span>${escapeHtml(s.label)}</div>`+
      `<div class="sub">${isLive ? (st.status||"connecting…") : "tap to connect"}</div></div>`+
      (isLive ? `<button class="iconbtn" data-act="disc" title="Disconnect"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></button>` : ``)+
      `<button class="iconbtn" data-act="ren" title="Rename"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>`+
      `<button class="iconbtn" data-act="del" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`;
    row.querySelector(".main").onclick = () => connectTo(s.id);
    const discBtn = row.querySelector('[data-act="disc"]'); if(discBtn) discBtn.onclick = () => disconnectSession(s.id);
    row.querySelector('[data-act="ren"]').onclick = () => renameSession(s.id);
    row.querySelector('[data-act="del"]').onclick = () => removeSession(s.id);
    el.appendChild(row);
  }
  updateBadges();
}

function renderChat(){
  $("chatEmpty").classList.toggle("hidden", !!activeId);
  $("chat").classList.toggle("hidden", !activeId);
  $("inputbar").classList.toggle("hidden", !(tab==="chat" && activeId));
  if(!activeId){ return; }
  const chat = $("chat"); chat.innerHTML = "";
  for(const m of msgs(activeId)){
    if(m.kind==="approval"){
      const detail = describeTool(m.tool, m.input);
      const card = document.createElement("div"); card.className="approval";
      card.innerHTML = `<div class="ahead">Run <b>${escapeHtml(m.tool||"tool")}</b>?</div>`+
        (detail?`<div class="abody mono">${escapeHtml(truncate(detail,300))}</div>`:``)+
        (m.decided?`<div class="adone">${m.decided==="allow"?"✓ Approved":"✗ Denied"}</div>`:
          `<div class="abtns"><button class="deny">Deny</button><button class="approve">Approve</button></div>`);
      if(!m.decided){ card.querySelector(".approve").onclick=()=>decide(m.id,"allow"); card.querySelector(".deny").onclick=()=>decide(m.id,"deny"); }
      chat.appendChild(card);
    } else {
      const d = document.createElement("div"); d.className="msg "+m.kind; d.textContent=m.text; chat.appendChild(d);
    }
  }
  if(busy.get(activeId)){ const t=document.createElement("div"); t.className="typing"; t.textContent="working "; chat.appendChild(t); }
  chat.scrollTop = chat.scrollHeight;
}

function renderInbox(){
  $("hSub").textContent = "";
  const el = $("inboxList");
  if(inbox.length===0){ el.innerHTML = '<div class="empty"><svg class="big" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><span class="eyebrow">Inbox empty</span>Approvals and finished tasks show up here.</div>'; return; }
  el.innerHTML = "";
  for(const it of inbox){
    const row = document.createElement("div"); row.className="irow";
    row.innerHTML = `<div class="ic" style="background:${it.kind==="approval"?"var(--amber)":"var(--green)"}"></div><div style="flex:1;min-width:0;">`+
      `<div class="it">${escapeHtml(it.title)}</div>`+
      (it.detail?`<div class="idet">${escapeHtml(it.detail)}</div>`:``)+
      `<div class="itime">${timeAgo(it.ts)}</div></div>`;
    el.appendChild(row);
  }
}

function updateBadges(){
  const live = Array.from(conns.values()).length;
  $("badge-sessions").classList.toggle("hidden", live===0);
  $("badge-inbox").classList.toggle("hidden", inbox.length===0);
}

// --- helpers ---------------------------------------------------------------
function summarize(input){ return input ? truncate(JSON.stringify(input),80) : ""; }
function truncate(s,n){ return s.length>n ? s.slice(0,n)+"…" : s; }
function describeTool(tool,input){ input=input||{}; if(tool==="Bash")return input.command||""; if(tool==="Edit"||tool==="Write"||tool==="NotebookEdit")return input.file_path||input.notebook_path||""; if(tool==="WebFetch")return input.url||""; return truncate(JSON.stringify(input),160); }
function timeAgo(ts){ const m=Math.floor(Math.max(0,Date.now()-ts)/60000); if(m<1)return "just now"; if(m<60)return m+"m ago"; const h=Math.floor(m/60); if(h<24)return h+"h ago"; return Math.floor(h/24)+"d ago"; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// --- wire up UI ------------------------------------------------------------
document.querySelectorAll(".tabbar button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
$("addPasteToggle").onclick=()=>$("addBox").classList.toggle("hidden");
$("addLinkBtn").onclick=()=>addFromLink($("linkInput").value.trim());
$("linkInput").addEventListener("keydown",e=>{ if(e.key==="Enter") addFromLink($("linkInput").value.trim()); });
$("sendBtn").onclick=send;
$("promptInput").addEventListener("keydown",e=>{ if(e.key==="Enter") send(); });
$("defaultRelay").value = settings.defaultRelay;
$("defaultRelay").addEventListener("change",()=>{ settings.defaultRelay = $("defaultRelay").value.trim()||DEFAULT_RELAY; save("pc_settings",settings); });
$("notifToggle").checked = !!settings.notifications;
$("notifToggle").addEventListener("change",()=>{ settings.notifications = $("notifToggle").checked; save("pc_settings",settings); });
$("clearBtn").onclick=clearAll;

// If opened from a QR/link (?room=…#k=…), auto-add that session and connect.
(function bootstrap(){
  if(!(window.crypto && crypto.subtle)){ document.querySelector("main").innerHTML = '<div class="empty">This page needs a secure (https) connection for encryption.</div>'; }
  const params = new URLSearchParams(location.search);
  const hash = new URLSearchParams(location.hash.replace(/^#/,""));
  if(params.get("room") && hash.get("k")){
    const fullLink = location.origin + location.pathname + location.search + location.hash;
    // history.replaceState to drop the key from the visible URL after capture
    addFromLink(fullLink);
    try { history.replaceState(null,"",location.pathname); } catch {}
    // Land on Sessions so the new tabbed layout is immediately visible
    // (the session is connected in the background; tap it to open Chat).
    switchTab("sessions");
  } else {
    switchTab("sessions");
  }
  renderSessions();
})();
</script>
